<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-image: url('background.jpg'); /* Your image name */
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      color: white; /* Makes text readable over images */
      font-family: sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .content-box {
      background: rgba(0, 0, 0, 0.7); /* Dark see-through box for text */
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 600px;
      backdrop-filter: blur(5px); /* Makes it look professional */
      border: 2px solid #ff69b4;
    }
    .download-btn {
      display: inline-block;
      background: #ff69b4;
      color: white;
      padding: 15px 30px;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      font-size: 20px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="content-box">
    {{ content }}
  </div>
</body>
</html>
