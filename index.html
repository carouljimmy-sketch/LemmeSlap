<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Slap Controller</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            max-width: 450px;
        }
        img.hero {
            width: 250px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid #ff69b4;
        }
        h1 { margin-bottom: 10px; font-size: 24px; }
        p { color: #aaa; line-height: 1.6; }
        .download-btn {
            display: inline-block;
            background-color: #ff69b4;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 25px;
            transition: 0.3s;
        }
        .download-btn:hover {
            background-color: #ff85c2;
            transform: scale(1.05);
        }
        .warning {
            font-size: 12px;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="imagee.png" 
            class="hero" alt="App Preview">
        
        <h1>👅 Laptop Slap Controller</h1>
        <p>Physical hardware feedback for the brave. Calibrate your mic, slap your laptop, and enjoy the reaction.</p>
        
        <a href="https://github.com/carouljimmy-sketch/LemmeSlap/releases/download/v1.0.0/LemmeSlap.exe" class="download-btn">DOWNLOAD v1.0</a>
        
        <div class="warning">
            Note: If Windows shows a warning, click "More Info" -> "Run Anyway".
        </div>
    </div>
</body>
</html>
